name: Demo Build
# PR-only validation gate. Pushes to main are built and published by
# deploy-pages.yml, so building again here on push would be redundant.
# This still catches build / sync-python / type errors before a PR merges.
on:
  pull_request:
    paths:
      - 'web/**'
      - 'python/**'
      # Documentation-only changes under python/ (README.md,
      # per-mapping *-NOTES.md) don't affect the build output, so
      # skip the PR gate for them. Mirrors the deploy-pages.yml
      # font-cache key exclusion — keeps the rule "markdown never
      # invalidates a build" consistent across both workflows.
      - '!python/**/*.md'
      - '.github/workflows/build-demo.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Run all yarn commands inside web/ so the working tree matches what
    # contributors see locally when they `cd web && yarn install`.
    defaults:
      run:
        working-directory: web

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # `yarn build` itself runs `yarn sync` first (see package.json), so
      # this single step also exercises sync-python.mjs and confirms it
      # successfully copies every file listed in its MANIFEST. If a
      # source file moves under python/ without the manifest being
      # updated, this step fails the PR.
      - name: Type-check + Vite build
        run: yarn build

      - name: Upload built site as artifact
        # Available for download from the Actions run page so you can
        # inspect the bundle without deploying. Wire up Netlify/Vercel
        # deploys separately if you want a live preview environment.
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  # Lints the mapping CSVs a PR actually touches — format, provenance
  # tags, base-script-leak-into-romanization, and glyph-budget headroom —
  # without needing the base fonts or a full build. Scoped to changed
  # files so a contributor's PR isn't blocked by pre-existing data quirks
  # elsewhere in the corpus. See python/mappings/CONTRIBUTING-mappings.md.
  validate-mappings:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff against the PR base

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate changed mapping CSVs
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            # Manual run (workflow_dispatch): full audit, informational only.
            echo "No PR base — validating all mapping CSVs (informational)."
            python python/mappings/validate_mappings.py || true
            exit 0
          fi
          changed=$(git diff --name-only "$base" "${{ github.sha }}" -- 'python/mappings/*.csv' || true)
          if [ -z "$changed" ]; then
            echo "No mapping CSVs changed — nothing to validate."
            exit 0
          fi
          echo "Validating changed mapping CSVs:"
          echo "$changed"
          python python/mappings/validate_mappings.py $changed
