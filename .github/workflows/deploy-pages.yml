name: Deploy to GitHub Pages

# Single source of truth for publishing https://wing-font.chunlaw.io.
#
# Why this replaced the old branch-based deploy
# ----------------------------------------------
# Previously the site shipped in two places, both pushing to the
# `gh-pages` BRANCH:
#   * `yarn deploy` (web/)        -> gh-pages root  (React app)
#   * build-fonts.yml            -> gh-pages /fonts/ (46 ttf+woff)
#
# A plain `git clone` fetches EVERY branch, so the ~150 MB of generated
# fonts living on gh-pages landed in every contributor's `.git` — the
# repo cloned far larger than its source warranted. `single-commit`
# kept history flat but couldn't stop each clone pulling the current
# snapshot.
#
# GitHub Pages' Actions deployment (actions/deploy-pages) serves an
# uploaded ARTIFACT instead of a branch. The built site is never stored
# as git objects, so once the gh-pages branch is deleted a clone
# contains only source. That is the whole point of this migration.
#
# Trade-off it forces
# -------------------
# An artifact deploy replaces the ENTIRE site each run, so every deploy
# must carry BOTH the React app and all 46 fonts — they can no longer
# ship independently. To keep web-only pushes fast we CACHE the built
# fonts keyed on a hash of their inputs (python/**). Fonts only rebuild
# (via the same parallel matrix as before) when those inputs change;
# otherwise they're restored from cache in seconds.
#
# Job graph
# ---------
#   probe-font-cache  -> is the fonts cache already populated?
#   build-fonts       -> [matrix] rebuild 46 fonts        (only on cache miss)
#   collect-fonts     -> flatten + save cache             (only on cache miss)
#   build-web         -> vite build (parallel to fonts)
#   deploy            -> web dist + fonts/ -> Pages artifact -> deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required by actions/deploy-pages: `pages: write` to publish and
# `id-token: write` for the OIDC token the deploy step exchanges.
permissions:
  contents: read
  pages: write
  id-token: write

# Standard Pages concurrency group. cancel-in-progress:false so a newer
# push waits for an in-flight deploy rather than leaving Pages half-set.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Decide whether the fonts need rebuilding ───────────────────────
  # lookup-only restore: checks the cache WITHOUT downloading it, just
  # to read cache-hit. The key folds in every font input plus this
  # workflow file (so editing the matrix invalidates the cache).
  probe-font-cache:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.probe.outputs.cache-hit }}
      key: ${{ steps.key.outputs.key }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Compute fonts cache key
        id: key
        # The cache key folds in everything Python-side plus this
        # workflow. Input-font binaries are NOT tracked in git
        # anymore (see python/init_fonts.py), so their content
        # doesn't contribute here — but the init_fonts.py file does,
        # and bumping the font list / CDN URL in that file
        # invalidates the cache correctly. If you ever want
        # binary-content-level invalidation, fold a per-font hash
        # file into the input-fonts repo and hash it here too.
        run: echo "key=fonts-${{ hashFiles('python/**', '.github/workflows/deploy-pages.yml') }}" >> "$GITHUB_OUTPUT"
      - name: Probe fonts cache
        id: probe
        uses: actions/cache/restore@v4
        with:
          path: fonts
          key: ${{ steps.key.outputs.key }}
          lookup-only: true

  # ── Build the 46 fonts (only when the cache is cold) ───────────────
  # Identical matrix to the retired build-fonts.yml: one runner per
  # font, fail-fast:false, max-parallel:20. Per-font artifacts are
  # consumed by collect-fonts below.
  build-fonts:
    needs: probe-font-cache
    if: needs.probe-font-cache.outputs.cache-hit != 'true'
    name: Build (${{ matrix.font.name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        # See the retired build-fonts.yml history for the full naming /
        # -as / -opt conventions behind each entry.
        font:
          # ── Trimmed in June 2026 matrix cleanup ──────────────────
          # 32 stylistic-only variants were removed: ChironHei
          # (2 entries — LSHK only, marginal coverage), ChironSung
          # Latin Italic (6), ChironSung Latin Invert (6),
          # ChironSung Latin Italic-Invert (6), and the same Italic
          # / Invert / Italic-Invert cuts across the 4 script-
          # specific (thai/katakana/korean/urdu) variants further
          # below (12 more). The Regular base versions below cover
          # the same linguistic content; users wanting Italic or
          # Inverted output can generate via `/generate` with `-v`.
          # See git history for the cut entries' exact args.
          # === Standard variants — ChironSung Regular ===============
          - { name: ChironSungHK-Noto-lshk,                args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale,                args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima,            args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong,           args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau,                 args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie,                  args: "-i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Script-specific annotation variants =================
          # ChironSung Regular base only — the Italic, Invert, and
          # Italic-Invert variants of these 4 lines (12 fonts total)
          # were trimmed in the June 2026 matrix cleanup along with
          # their Latin-romanization counterparts above. See the
          # "Trimmed" note before "Standard variants — ChironSung
          # Regular" for the rationale.
          - { name: ChironSungHK-Google-thai,              args: "-opt -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana,          args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean,            args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          - { name: ChironSungHK-NotoNastaliq-urdu,        args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoNastaliqUrdu-VariableFont_wght.ttf -m mappings/canto-urdu.csv -as 0.16" }
          # === Cantonese — Noto Sans HK base (lighter showcase set) =
          # Hong-Kong-styled Cantonese variants. Same six mappings as
          # the ChironSung set above but built on Noto Sans HK
          # (variable wght) — output files are roughly half the size
          # of the Chiron equivalents, so /showcase loads ~2× faster
          # on slow connections. Chiron variants stay built and
          # downloadable; these are the new default showcase set.
          - { name: NotoSansHK-Noto-lshk,                  args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: NotoSansHK-Noto-yale,                  args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: NotoSansHK-Noto-chishima,              args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: NotoSansHK-Noto-guangdong,             args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: NotoSansHK-Noto-lau,                   args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          # Cangjie under Noto Sans HK: annotation IS the base font
          # (so the radicals render in HK style), no -opt because
          # subsetting would chase the self-reference.
          - { name: NotoSansHK-cangjie,                    args: "-i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSansHK-VariableFont_wght.ttf -m mappings/cangjie.csv -as 0.25" }
          # Script-specific Cantonese transliterations on the HK base.
          - { name: NotoSansHK-Google-thai,                args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: NotoSansHK-NotoJP-katakana,            args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: NotoSansHK-NotoKR-korean,              args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Urdu (Nastaʿlīq, RTL). -as 0.16 — smaller than the other
          # transliterations for TWO reasons: (1) Nastaliq cascades far
          # more vertically, and (2) the output inherits NotoSansHK's
          # ascent (1160u) which the pipeline never raises. The tallest
          # reading is kʰ+short-a (kam/kap → کھَم/کھَپ): the zabar perched
          # atop the tall kaf reaches 2132u in the anno font, so the
          # composed glyph tops out at 800 + 2132*as. At 0.18 that's
          # 1184u (clips the 1160 ascent by 24u); 0.16 → 1141u (19u
          # headroom). Do NOT raise above 0.16 without either lowering
          # -y (offset) or accepting a clipped zabar tip on kam-syllables.
          # NotoSansHK + Urdu: at -as 0.16 the zabar-cap tops out at
          # 1141u, leaving only 19u headroom against the 1160u
          # winAscent — perilously close. Bumping to -as 0.22 with
          # --out-ascent 1300 gives a chunkier, more legible Urdu
          # cascade (top ~1269u with ~31u headroom inside the raised
          # 1300u ascent). The trade-off is a slightly taller line in
          # apps that honour winAscent; for dialect-learning material
          # this is fine.
          - { name: NotoSansHK-NotoNastaliq-urdu,          args: "-opt -i input_fonts/NotoSansHK-VariableFont_wght.ttf -a input_fonts/NotoNastaliqUrdu-VariableFont_wght.ttf -m mappings/canto-urdu.csv -as 0.22 --out-ascent 1300" }
          # === Hero sample font ====================================
          # All three hero subsets use the same Xiaolai (handwritten,
          # OFL) + Huninn (Latin-friendly CJK) pairing so the home page
          # hero is visually unified across Cantonese / Taiwanese /
          # Teochew phrases. Previous versions used ChironSung HK and
          # Noto Sans TC bases respectively — see git history.
          - { name: Xiaolai-Huninn-hero-sample,            args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-sample.csv -as 0.25" }
          # === Taiwanese / Southern Min (河洛話) showcase ===========
          # tailo / poj are the MOE 優勢腔 standard (sutian via ChhoeTaigi);
          # sannkiap is the distinctive 三峽偏泉腔 accent (雞 = kere) — one
          # of nine 腔 variants, all also offered in /generate.
          # Two pairings — Noto Sans TC + Huninn (clean sans) and Xiaolai
          # + M+ Rounded 1c (warm handwritten) — built for every
          # taigi-tl-*.csv: the 優勢腔 standard (tailo) plus all nine 腔
          # accent variants. M+ Rounded 1c carries the full Tâi-lô tone
          # marks (M+ 1m does not). All also offered in /generate.
          - { name: NotoSansTC-Huninn-tailo,                   args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-toned.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-poj,                     args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-poj-toned.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-taipak,                  args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-taipak.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-sannkiap,                args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-sannkiap.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-sintik,                  args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-sintik.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-taitiong,                args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-taitiong.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-lokkang,                 args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-lokkang.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-tailam,                  args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-tailam.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-kohiong,                 args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-kohiong.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-gilan,                   args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-gilan.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-manking,                 args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-manking.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-tailo,                args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-toned.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-taipak,               args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-taipak.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-sannkiap,             args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-sannkiap.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-sintik,               args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-sintik.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-taitiong,             args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-taitiong.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-lokkang,              args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-lokkang.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-tailam,               args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-tailam.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-kohiong,              args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-kohiong.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-gilan,                args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-gilan.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-manking,              args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/taigi-tl-manking.csv -as 0.25" }
          - { name: Xiaolai-Huninn-hero-tailo,             args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-taigi.csv -as 0.25" }
          # Non-Latin Taiwanese annotation (data from ButTaiwan/taigivs).
          # 方音符號 (TPS): annotation font must cover Bopomofo + Bopomofo
          # Extended — Noto Sans TC does (serves as both base and anno).
          # 台灣語假名 (kana): pair the TC base with Noto Sans JP for katakana.
          - { name: NotoSansTC-tps,                        args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/NotoSansTC-VariableFont_wght.ttf -m mappings/taigi-tps.csv -as 0.25" }
          - { name: NotoSansTC-NotoJP-kana,                args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/taigi-kana.csv -as 0.25" }
          # === Teochew / Min Nan (潮州話) showcase ==================
          - { name: NotoSansTC-Huninn-teochew-pengim,      args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-gdpi.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-teochew-puj,         args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-duffus.csv -as 0.25" }
          - { name: Xiaolai-Huninn-hero-pengim,            args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-teochew.csv -as 0.25" }
          # === Mandarin (普通話 / 國語) showcase ====================
          # Two regional standards, built from the SAME annotation fonts
          # but DIFFERENT glyph (base) + mapping pairs:
          #   • -cn → mappings/mandarin-cn.csv on Simplified-region base
          #     fonts (Noto Sans SC / Noto Serif SC / Xiaolai SC). The
          #     Mainland 普通話 standard — also what Singapore / Malaysia
          #     officially adopt.
          #   • -tw → mappings/mandarin-tw.csv on Traditional base fonts.
          #     The Taiwan 國語 standard — 753 single-character defaults
          #     re-derived from the MOE 國語辭典 (e.g. 期 qī→qí, 危 wēi→wéi,
          #     突 tū→tú). mandarin-tw.csv is a Traditional-Chinese mapping
          #     (166 of the 753 differences are traditional-only glyphs),
          #     so the -tw builds use Noto Sans TC and Xiaolai SC — the two
          #     hub fonts that cover ≥95% of the common Traditional set
          #     (Noto Sans TC 97.8%, Xiaolai SC 100%). Noto Serif SC is a
          #     Simplified-region serif, so it ships -cn only.
          - { name: NotoSansSC-Huninn-mandarin-cn,         args: "-opt -i input_fonts/NotoSansSC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/mandarin-cn.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-mandarin-tw,         args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/mandarin-tw.csv -as 0.25" }
          # Mengshen-equivalent products (source fonts are SIL OFL-1.1, user-supplied in input_fonts/).
          # Serif: Source Han Serif (Noto Serif SC) + M+ 1m — Simplified, -cn only.
          # Handwritten: Xiaolai + M+ Rounded 1c (OFL stand-in for Mengshen's non-OFL SetoFontSP); Xiaolai SC covers Traditional, so it builds both -cn and -tw.
          - { name: SourceHanSerif-Mplus-mandarin-cn,      args: "-opt -i input_fonts/SourceHanSerif-Regular.ttf -a input_fonts/mplus-1m-medium.ttf -m mappings/mandarin-cn.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-mandarin-cn,      args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/mandarin-cn.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-mandarin-tw,      args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/mandarin-tw.csv -as 0.25" }
          # === Xiaolai + Huninn family (handwritten base) ============
          # A consistent base + annotation pairing across every dialect
          # mapping the Huninn annotation font can render in Latin
          # script: Cantonese (Jyutping × 5), Taiwanese (Tâi-lô + POJ),
          # Teochew (Peng'im + PUJ), and Mandarin Pinyin. Skipped:
          # cangjie (annotation IS the base font, not a Latin scheme),
          # canto-thai/katakana/korean (Huninn doesn't cover those
          # scripts), and taigi-kana/tps (likewise outside Huninn's
          # repertoire). Xiaolai gives a warm handwritten 楷書 feel
          # distinct from the existing Noto Sans HK / ChironSung
          # showcase sets, while Huninn keeps the romanizations
          # legible at small sizes.
          - { name: Xiaolai-Huninn-lshk,                   args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/canto-lshk.csv -as 0.25" }
          - { name: Xiaolai-Huninn-yale,                   args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/canto-yale.csv -as 0.25" }
          - { name: Xiaolai-Huninn-lau,                    args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/canto-lau.csv -as 0.25" }
          - { name: Xiaolai-Huninn-guangdong,              args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/canto-guangdong.csv -as 0.25" }
          - { name: Xiaolai-Huninn-chishima,               args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/canto-chishima.csv -as 0.25" }
          # Cantonese non-romanization variants on Xiaolai base. Cangjie
          # uses Xiaolai as its own annotation source (input-method
          # radicals render in Xiaolai's hand-drawn style alongside the
          # base character), so no -opt — subsetting would chase the
          # self-reference. Thai / Katakana / Korean re-use the same
          # annotation fonts as the Noto Sans HK / Chiron variants —
          # only the base swaps.
          - { name: Xiaolai-cangjie,                       args: "-i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/XiaolaiSC-Regular.ttf -m mappings/cangjie.csv -as 0.25" }
          # ── Xiaolai-paired script transliterations ──────────────
          # Xiaolai's native ascent is 880u — 280u shorter than
          # NotoSansHK's 1160u. The script-transliteration -as
          # values inherited from the NotoSansHK rows would make
          # annotations look proportionally small (they were
          # calibrated for NotoSansHK's larger headroom). We:
          #   * Bump -as upward to recover legible annotation size
          #     (Thai/Kana/Korean ~0.26-0.28; Urdu 0.22).
          #   * Raise --out-ascent to 1200 (1300 for Urdu) so the
          #     top of the annotation doesn't clip against the
          #     output font's winAscent in strict-clipping apps.
          # Same line-height bump trade-off as the NotoSansHK Urdu
          # line above — accepted for the legibility win.
          - { name: Xiaolai-Google-thai,                   args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.26 --out-ascent 1200" }
          - { name: Xiaolai-NotoJP-katakana,               args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.28 --out-ascent 1200" }
          - { name: Xiaolai-NotoKR-korean,                 args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.28 --out-ascent 1200" }
          - { name: Xiaolai-NotoNastaliq-urdu,             args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoNastaliqUrdu-VariableFont_wght.ttf -m mappings/canto-urdu.csv -as 0.22 --out-ascent 1300" }
          # Devanagari / Gurmukhi: height-matched to Thai/Kana/Hangul
          # (worst-top ~1033u @0.26), so they share the 0.26 / out-ascent
          # 1200 band. Hind is static Regular; Noto Sans Gurmukhi is
          # variable (defaults to wght 400). Gurmukhi runs a touch wide,
          # so both stay at 0.26 rather than 0.28.
          - { name: Xiaolai-Hind-hindi,                    args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Hind-Regular.ttf -m mappings/canto-hindi.csv -as 0.26 --out-ascent 1200" }
          - { name: Xiaolai-Gurmukhi-punjab,               args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a 'input_fonts/NotoSansGurmukhi-VariableFont_wdth,wght.ttf' -m mappings/canto-punjab.csv -as 0.26 --out-ascent 1200" }
          # Toneless / decorative variants (tone digit stripped) — souvenir
          # set, Xiaolai base. Same -as / --out-ascent treatment as the
          # toned Xiaolai annotation lines above (recovering legible size
          # against Xiaolai's 880u native ascent). Baybayin shares the
          # height profile of Thai/Kana/Hangul so it gets the 0.26-0.28
          # band; Urdu gets the higher --out-ascent for the Nastaliq
          # cascade.
          - { name: Xiaolai-Google-thai-notone,            args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai-notone.csv -as 0.26 --out-ascent 1200" }
          - { name: Xiaolai-NotoJP-katakana-notone,        args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana-notone.csv -as 0.28 --out-ascent 1200" }
          - { name: Xiaolai-NotoKR-korean-notone,          args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean-notone.csv -as 0.28 --out-ascent 1200" }
          - { name: Xiaolai-NotoTagalog-baybayin-notone,   args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoSansTagalog-Regular.ttf -m mappings/canto-filipino-notone.csv -as 0.28 --out-ascent 1200" }
          - { name: Xiaolai-NotoNastaliq-urdu-notone,      args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/NotoNastaliqUrdu-VariableFont_wght.ttf -m mappings/canto-urdu-notone.csv -as 0.22 --out-ascent 1300" }
          - { name: Xiaolai-Hind-hindi-notone,             args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Hind-Regular.ttf -m mappings/canto-hindi-notone.csv -as 0.26 --out-ascent 1200" }
          - { name: Xiaolai-Gurmukhi-punjab-notone,        args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a 'input_fonts/NotoSansGurmukhi-VariableFont_wdth,wght.ttf' -m mappings/canto-punjab-notone.csv -as 0.26 --out-ascent 1200" }
          # ── Arabic-base word-unit font (NEW tier) ────────────────
          # First curated font using the WORD-UNIT pipeline with a
          # non-Han base script. The pipeline (word_liga_handler.py)
          # composes each Arabic word into a single annotated glyph
          # with cursive shaping intact, then exposes it through
          # GSUB ligation with boundary guards. Result: typing سلام
          # produces a glyph that LOOKS like سلام but carries
          # `salām` stacked above. Pre-built from the hand-curated
          # ~130-word arabic-romanization.csv starter set; expand
          # via gen_arabic_romanization.py later.
          #
          # `--out-ascent` not needed for this pairing: NotoSansArabic's
          # ascent (~1500u) already accommodates the Latin annotation
          # above. `-as 0.25` is a starting guess — may want tuning
          # after eyeballing the first build.
          - { name: NotoSansArabic-Noto-romanization,      args: "-opt -i 'input_fonts/NotoSansArabic-VariableFont_wdth,wght.ttf' -a input_fonts/NotoSerif-Regular.ttf -m mappings/arabic-romanization.csv -as 0.25" }
          - { name: Xiaolai-Huninn-tailo,                  args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-toned.csv -as 0.25" }
          - { name: Xiaolai-Huninn-poj,                    args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-poj-toned.csv -as 0.25" }
          - { name: Xiaolai-Huninn-teochew-pengim,         args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-gdpi.csv -as 0.25" }
          - { name: Xiaolai-Huninn-teochew-puj,            args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-duffus.csv -as 0.25" }
          - { name: Xiaolai-Huninn-mandarin-cn,            args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/mandarin-cn.csv -as 0.25" }
          - { name: Xiaolai-Huninn-mandarin-tw,            args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/mandarin-tw.csv -as 0.25" }

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: ./python/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
      - name: Cache input fonts
        # Input fonts live in a separate gh-pages-served repo (see
        # init_fonts.py). The download is ~250 MB across 15 files, so
        # caching saves ~30-60 s per matrix slot AND saves bandwidth
        # on the input-fonts repo. Cache key folds in init_fonts.py's
        # content — bumping the font list or CDN URL invalidates the
        # cache; bumping a font's bytes upstream WITHOUT touching
        # init_fonts.py would not invalidate (acceptable risk: input
        # fonts rarely change in ways we'd want to silently pick up
        # on the same matrix run, and a manual cache-bust line in
        # init_fonts.py covers the override case).
        id: cache-input-fonts
        uses: actions/cache@v4
        with:
          path: python/input_fonts
          key: input-fonts-${{ hashFiles('python/init_fonts.py') }}
      - name: Fetch input fonts (if cache miss)
        if: steps.cache-input-fonts.outputs.cache-hit != 'true'
        run: python init_fonts.py
      - name: Build font
        run: |
          mkdir -p outputs
          set -o xtrace
          python wing-font.py ${{ matrix.font.args }} -f ${{ matrix.font.name }} -o outputs/${{ matrix.font.name }}
      - name: Upload font artifact
        uses: actions/upload-artifact@v4
        with:
          name: font-${{ matrix.font.name }}
          path: |
            python/outputs/${{ matrix.font.name }}.ttf
            python/outputs/${{ matrix.font.name }}.woff2
          retention-days: 1
          if-no-files-found: error

  # ── Flatten the per-font artifacts and warm the cache ──────────────
  # Runs only on a cache miss AND only if every matrix leg succeeded
  # (default needs semantics). That guard is deliberate: saving a
  # PARTIAL font set would poison the cache and the missing fonts would
  # never rebuild on later runs. A failed font therefore fails the
  # whole deploy instead of silently shipping an incomplete /fonts/.
  collect-fonts:
    needs: [probe-font-cache, build-fonts]
    if: needs.probe-font-cache.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all font artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: font-*
          merge-multiple: true
          path: fonts
      - name: List fonts
        run: ls -lh fonts/
      - name: Save fonts cache
        uses: actions/cache/save@v4
        with:
          path: fonts
          key: ${{ needs.probe-font-cache.outputs.key }}

  # ── Build the React app (parallel to the fonts) ────────────────────
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python (for init_fonts.py)
        # Plain stdlib script — Python 3.10+ suffices, no
        # requirements.txt install needed in this job.
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
      - name: Cache input fonts
        # Shared with the build-fonts matrix above; same key shape so
        # the two jobs hit the same cache entry on warm runs.
        id: cache-input-fonts
        uses: actions/cache@v4
        with:
          path: python/input_fonts
          key: input-fonts-${{ hashFiles('python/init_fonts.py') }}
      - name: Fetch input fonts (if cache miss)
        # `yarn build` runs `yarn sync` first, which copies
        # python/input_fonts/*.ttf into public/wingfont/ for the
        # in-browser Pyodide worker. The fonts have to physically
        # exist before sync runs; that's what this step ensures.
        if: steps.cache-input-fonts.outputs.cache-hit != 'true'
        working-directory: python
        run: python init_fonts.py
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Type-check + Vite build
        # `yarn build` also runs `yarn sync` (sync-python.mjs), so this
        # mirrors Python sources into dist/wingfont for the Pyodide
        # worker — same as the old build-demo step.
        run: yarn build
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
          if-no-files-found: error

  # ── Assemble the site and publish it ───────────────────────────────
  # !cancelled() + per-need result checks (rather than success()) so the
  # job still runs on the cache-HIT path, where build-fonts/collect-fonts
  # are SKIPPED. It will not run if build-web failed or if a font build
  # failed on a cache-miss (collect-fonts would then not be 'success').
  deploy:
    needs: [probe-font-cache, build-web, collect-fonts]
    if: >-
      ${{ !cancelled()
          && needs.build-web.result == 'success'
          && (needs.collect-fonts.result == 'success' || needs.collect-fonts.result == 'skipped') }}
    runs-on: ubuntu-latest
    # Per-job permissions (overrides the workflow-level read for
    # `contents`). `contents: write` is required by the two release
    # steps at the end of this job — `gh release create / delete`
    # both go through the GitHub Releases REST API which checks
    # this scope. The other jobs in this workflow stay read-only.
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out repository code
        # Needed by the gh CLI release steps: gh expects to be run
        # inside a git checkout so it can infer the repo from the
        # remote. (download-artifact alone doesn't set that up.)
        uses: actions/checkout@v4
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: site
      - name: Restore fonts from cache
        uses: actions/cache/restore@v4
        with:
          path: fonts
          key: ${{ needs.probe-font-cache.outputs.key }}
          # On the cache-miss path collect-fonts saved this exact key
          # moments ago; on the cache-hit path it was already warm.
          fail-on-cache-miss: true
      - name: Place WOFF2 fonts under the site at /fonts/
        # VITE_FONT_URL = https://wing-font.chunlaw.io/fonts, so the
        # fonts must live at the served path /fonts/. We only copy
        # WOFF2 onto Pages — TTFs are roughly 2× the bytes and would
        # exhaust the Pages bandwidth budget on a popular project.
        # TTFs go to a rolling GitHub Release instead (see the
        # "Publish TTFs ..." step below); /showcase's "Download .ttf"
        # button links to the release URL via VITE_TTF_URL.
        run: |
          mkdir -p site/fonts
          cp -v fonts/*.woff2 site/fonts/
      - name: Generate /fonts/index.html
        # GitHub Pages doesn't serve directory indexes, so a request
        # to https://wing-font.chunlaw.io/fonts/ would otherwise
        # return a blank page. This step walks site/fonts/ after the
        # cp above and emits a static index.html alongside the font
        # files — a clean directory listing with direct .ttf / .woff
        # download pills, regenerated on every deploy so it stays in
        # sync with the matrix.
        #
        # The generator is in .github/scripts/ rather than inline
        # here on purpose: this workflow file's content is folded
        # into the font cache key (probe-font-cache, line ~81), so
        # any edit invalidates the cache and triggers a full
        # ~70-font rebuild. Keeping the generator out-of-line means
        # CSS / copy tweaks on the index page are cache-neutral.
        #
        # Pure stdlib Python — no setup-python step needed beyond the
        # system Python that ubuntu-latest ships with.
        run: python3 .github/scripts/gen-fonts-index.py site/fonts
      - name: Ensure CNAME and .nojekyll are present
        # CNAME ships from web/public so the custom domain survives each
        # deploy. The Actions artifact path does not run Jekyll, but
        # .nojekyll is kept as belt-and-braces for the _-prefixed Python
        # package files mirrored into wingfont/.
        run: |
          echo "wing-font.chunlaw.io" > site/CNAME
          touch site/.nojekyll
      - name: Show what will be published
        run: |
          echo "Top level:" && ls -la site/
          echo "Fonts:" && ls -lh site/fonts/ | head
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ── Publish TTFs to a rolling GitHub Release ──────────────────
      # TTFs DON'T ship with the Pages site (see the cp step above)
      # because they're ~2× the WOFF2 bytes and would chew through the
      # 100 GB/month Pages bandwidth budget. Instead each main push
      # cuts a new build-<short-sha> release containing every .ttf the
      # matrix produced, marked --latest so the
      # `releases/latest/download/<name>.ttf` redirect always resolves
      # to the current set. VITE_TTF_URL (web/.env.production) points
      # at that redirect, so /showcase's "Download .ttf" button and
      # the gen-fonts-index page's .ttf pill both follow it without
      # caring which specific tag is current.
      #
      # The next step (prune) keeps only the 3 most recent build-<sha>
      # releases so storage doesn't grow unboundedly. Three's worth of
      # rollback headroom matches the project's "generator, not
      # archive" philosophy — current + N-1 + N-2 gives a couple of
      # rollback hops if a deploy ships broken bytes.
      - name: Publish TTFs to rolling GitHub Release
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="build-${SHORT_SHA}"
          echo "Creating release $TAG with $(ls fonts/*.ttf | wc -l) TTF assets"
          # --latest marks this release as the one /releases/latest/
          # redirects to. --target main pins the tag to the deploy
          # commit so a click-through from the release UI lands on
          # the right source state.
          gh release create "$TAG" fonts/*.ttf \
            --target main \
            --title "Pre-built fonts (build $SHORT_SHA)" \
            --notes "Auto-generated by deploy-pages.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ) from main@$SHORT_SHA.

          This release contains the TTF outputs of the Wing Font CI matrix at this commit. WOFF2 versions of the same fonts ship with the Pages site at https://wing-font.chunlaw.io/fonts/ (the directory index there shows the WOFF2 + TTF pair for each font).

          Stable URL form: \`https://github.com/chunlaw/wing-font-generator/releases/latest/download/<name>.ttf\` always redirects to the latest \`build-<sha>\` release. CI keeps the 3 most recent." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune older build-* releases (keep 3 most recent)
        # Sliding window over build-<sha> releases. List all of them
        # newest-first, skip the 3 we keep, delete the rest with the
        # tag too (--cleanup-tag). The jq filter is the load-bearing
        # bit: it selects only releases whose tag begins with
        # "build-" so we don't ever touch hand-cut version tags
        # someone might add later (v1.0 etc.).
        #
        # `|| true` on the gh delete keeps a transient API hiccup
        # from failing the whole deploy — worst case we leave an
        # extra release behind and the next run prunes it.
        run: |
          set -euo pipefail
          KEEP=3
          gh release list --limit 100 --json tagName,createdAt \
            | jq -r '[.[] | select(.tagName | startswith("build-"))]
                     | sort_by(.createdAt) | reverse
                     | .[(env.KEEP | tonumber):]
                     | .[].tagName' \
            | while read -r tag; do
                [ -n "$tag" ] || continue
                echo "Pruning release + tag: $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "3"
