name: Deploy to GitHub Pages

# Single source of truth for publishing https://wing-fonts.chunlaw.io.
#
# Why this replaced the old branch-based deploy
# ----------------------------------------------
# Previously the site shipped in two places, both pushing to the
# `gh-pages` BRANCH:
#   * `yarn deploy` (web/)        -> gh-pages root  (React app)
#   * build-fonts.yml            -> gh-pages /fonts/ (46 ttf+woff)
#
# A plain `git clone` fetches EVERY branch, so the ~150 MB of generated
# fonts living on gh-pages landed in every contributor's `.git` — the
# repo cloned far larger than its source warranted. `single-commit`
# kept history flat but couldn't stop each clone pulling the current
# snapshot.
#
# GitHub Pages' Actions deployment (actions/deploy-pages) serves an
# uploaded ARTIFACT instead of a branch. The built site is never stored
# as git objects, so once the gh-pages branch is deleted a clone
# contains only source. That is the whole point of this migration.
#
# Trade-off it forces
# -------------------
# An artifact deploy replaces the ENTIRE site each run, so every deploy
# must carry BOTH the React app and all 46 fonts — they can no longer
# ship independently. To keep web-only pushes fast we CACHE the built
# fonts keyed on a hash of their inputs (python/**). Fonts only rebuild
# (via the same parallel matrix as before) when those inputs change;
# otherwise they're restored from cache in seconds.
#
# Job graph
# ---------
#   probe-font-cache  -> is the fonts cache already populated?
#   build-fonts       -> [matrix] rebuild 46 fonts        (only on cache miss)
#   collect-fonts     -> flatten + save cache             (only on cache miss)
#   build-web         -> vite build (parallel to fonts)
#   deploy            -> web dist + fonts/ -> Pages artifact -> deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required by actions/deploy-pages: `pages: write` to publish and
# `id-token: write` for the OIDC token the deploy step exchanges.
permissions:
  contents: read
  pages: write
  id-token: write

# Standard Pages concurrency group. cancel-in-progress:false so a newer
# push waits for an in-flight deploy rather than leaving Pages half-set.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Decide whether the fonts need rebuilding ───────────────────────
  # lookup-only restore: checks the cache WITHOUT downloading it, just
  # to read cache-hit. The key folds in every font input plus this
  # workflow file (so editing the matrix invalidates the cache).
  probe-font-cache:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.probe.outputs.cache-hit }}
      key: ${{ steps.key.outputs.key }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Compute fonts cache key
        id: key
        run: echo "key=fonts-${{ hashFiles('python/**', '.github/workflows/deploy-pages.yml') }}" >> "$GITHUB_OUTPUT"
      - name: Probe fonts cache
        id: probe
        uses: actions/cache/restore@v4
        with:
          path: fonts
          key: ${{ steps.key.outputs.key }}
          lookup-only: true

  # ── Build the 46 fonts (only when the cache is cold) ───────────────
  # Identical matrix to the retired build-fonts.yml: one runner per
  # font, fail-fast:false, max-parallel:20. Per-font artifacts are
  # consumed by collect-fonts below.
  build-fonts:
    needs: probe-font-cache
    if: needs.probe-font-cache.outputs.cache-hit != 'true'
    name: Build (${{ matrix.font.name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        # See the retired build-fonts.yml history for the full naming /
        # -as / -opt conventions behind each entry.
        font:
          # === Inverted variants — ChironHei + LSHK ================
          - { name: ChironHeiHK-Noto-lshk-B-Invert,        args: "-v -y 0.3 -opt -i input_fonts/ChironHeiHK-B.ttf  -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironHeiHK-Noto-lshk-Invert,          args: "-v -y 0.3 -opt -i input_fonts/ChironHeiHK-R.ttf  -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          # === Inverted variants — ChironSung Regular + each Cantonese romanization
          - { name: ChironSungHK-Noto-lshk-Invert,         args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale-Invert,         args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima-Invert,     args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong-Invert,    args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau-Invert,          args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          # Cangjie skips -opt: annotation IS the base font, subsetting would break the self-reference.
          - { name: ChironSungHK-cangjie-Invert,           args: "-v -y 0.3 -i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Inverted variants — ChironSung Italic + each Cantonese romanization
          - { name: ChironSungHK-Noto-lshk-It-Invert,      args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale-It-Invert,      args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima-It-Invert,  args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong-It-Invert, args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau-It-Invert,       args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie-It-Invert,        args: "-v -y 0.3 -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/ChironSungHK-R-It.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Standard variants — ChironSung Regular ===============
          - { name: ChironSungHK-Noto-lshk,                args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale,                args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima,            args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong,           args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau,                 args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie,                  args: "-i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Standard variants — ChironSung Italic ================
          - { name: ChironSungHK-Noto-lshk-It,             args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale-It,             args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima-It,         args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong-It,        args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau-It,              args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie-It,               args: "-i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/ChironSungHK-R-It.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Script-specific annotation variants =================
          # Inverted, ChironSung Regular:
          - { name: ChironSungHK-Google-thai-Invert,       args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana-Invert,   args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean-Invert,     args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Inverted, ChironSung Italic:
          - { name: ChironSungHK-Google-thai-It-Invert,    args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana-It-Invert, args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean-It-Invert,  args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Standard, ChironSung Regular:
          - { name: ChironSungHK-Google-thai,              args: "-opt -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana,          args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean,            args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Standard, ChironSung Italic:
          - { name: ChironSungHK-Google-thai-It,           args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana-It,       args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean-It,         args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # === Hero sample font ====================================
          - { name: ChironSungHK-hero-sample,              args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/hero-sample.csv -as 0.27" }
          # === Taiwanese / Southern Min (河洛話) showcase ===========
          - { name: NotoSansTC-Huninn-tailo,               args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-toned.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-poj,                 args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-poj-toned.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-hero-tailo,          args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-taigi.csv -as 0.25" }
          # === Teochew / Min Nan (潮州話) showcase ==================
          - { name: NotoSansTC-Huninn-teochew-pengim,      args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-gdpi.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-teochew-puj,         args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-duffus.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-hero-pengim,         args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-teochew.csv -as 0.25" }
          # === Mandarin (普通話 / 國語) showcase ====================
          - { name: NotoSansSC-Huninn-mandarin,            args: "-opt -i input_fonts/NotoSansSC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/mandarin.csv -as 0.25" }
          # Mengshen-equivalent products (source fonts are SIL OFL-1.1, user-supplied in input_fonts/).
          # Serif: Source Han Serif + M+ 1m. Handwritten: Xiaolai + M+ Rounded 1c (OFL stand-in for Mengshen's non-OFL SetoFontSP).
          - { name: SourceHanSerif-Mplus-mandarin,         args: "-opt -i input_fonts/SourceHanSerif-Regular.ttf -a input_fonts/mplus-1m-medium.ttf -m mappings/mandarin.csv -as 0.25" }
          - { name: Xiaolai-MplusRounded-mandarin,         args: "-opt -i input_fonts/XiaolaiSC-Regular.ttf -a input_fonts/MPLUSRounded1c-Regular.ttf -m mappings/mandarin.csv -as 0.25" }

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: ./python/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
      - name: Build font
        run: |
          mkdir -p outputs
          set -o xtrace
          python wing-font.py ${{ matrix.font.args }} -f ${{ matrix.font.name }} -o outputs/${{ matrix.font.name }}
      - name: Upload font artifact
        uses: actions/upload-artifact@v4
        with:
          name: font-${{ matrix.font.name }}
          path: |
            python/outputs/${{ matrix.font.name }}.ttf
            python/outputs/${{ matrix.font.name }}.woff
          retention-days: 1
          if-no-files-found: error

  # ── Flatten the per-font artifacts and warm the cache ──────────────
  # Runs only on a cache miss AND only if every matrix leg succeeded
  # (default needs semantics). That guard is deliberate: saving a
  # PARTIAL font set would poison the cache and the missing fonts would
  # never rebuild on later runs. A failed font therefore fails the
  # whole deploy instead of silently shipping an incomplete /fonts/.
  collect-fonts:
    needs: [probe-font-cache, build-fonts]
    if: needs.probe-font-cache.outputs.cache-hit != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all font artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: font-*
          merge-multiple: true
          path: fonts
      - name: List fonts
        run: ls -lh fonts/
      - name: Save fonts cache
        uses: actions/cache/save@v4
        with:
          path: fonts
          key: ${{ needs.probe-font-cache.outputs.key }}

  # ── Build the React app (parallel to the fonts) ────────────────────
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Type-check + Vite build
        # `yarn build` also runs `yarn sync` (sync-python.mjs), so this
        # mirrors Python sources into dist/wingfont for the Pyodide
        # worker — same as the old build-demo step.
        run: yarn build
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
          if-no-files-found: error

  # ── Assemble the site and publish it ───────────────────────────────
  # !cancelled() + per-need result checks (rather than success()) so the
  # job still runs on the cache-HIT path, where build-fonts/collect-fonts
  # are SKIPPED. It will not run if build-web failed or if a font build
  # failed on a cache-miss (collect-fonts would then not be 'success').
  deploy:
    needs: [probe-font-cache, build-web, collect-fonts]
    if: >-
      ${{ !cancelled()
          && needs.build-web.result == 'success'
          && (needs.collect-fonts.result == 'success' || needs.collect-fonts.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: site
      - name: Restore fonts from cache
        uses: actions/cache/restore@v4
        with:
          path: fonts
          key: ${{ needs.probe-font-cache.outputs.key }}
          # On the cache-miss path collect-fonts saved this exact key
          # moments ago; on the cache-hit path it was already warm.
          fail-on-cache-miss: true
      - name: Place fonts under the site at /fonts/
        # VITE_FONT_URL = https://wing-fonts.chunlaw.io/fonts, so the
        # fonts must live at the served path /fonts/.
        run: |
          mkdir -p site/fonts
          cp -v fonts/* site/fonts/
      - name: Ensure CNAME and .nojekyll are present
        # CNAME ships from web/public so the custom domain survives each
        # deploy. The Actions artifact path does not run Jekyll, but
        # .nojekyll is kept as belt-and-braces for the _-prefixed Python
        # package files mirrored into wingfont/.
        run: |
          echo "wing-fonts.chunlaw.io" > site/CNAME
          touch site/.nojekyll
      - name: Show what will be published
        run: |
          echo "Top level:" && ls -la site/
          echo "Fonts:" && ls -lh site/fonts/ | head
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
