name: Fonts Generation

# Builds the 25 production fonts and publishes them to the `fonts/`
# subfolder of the `gh-pages` branch — i.e. served at
# https://wing-fonts.chunlaw.io/fonts/X.{ttf,woff}.
#
# Coexistence with `yarn deploy`
# ------------------------------
# `yarn deploy` (from web/) writes to the gh-pages branch ROOT — index.html,
# /assets/, /favicon.ico, etc. This workflow writes to gh-pages /fonts/
# only (via `target-folder: fonts`). Different paths, no collision.
#
# Both writers force-push a SINGLE COMMIT per deploy so the gh-pages
# branch tree stays at "current snapshot" size — no history accumulation,
# no stale-hashed-asset bloat, fast checkout for GitHub's auto
# pages-build-deployment workflow:
#
#   * `single-commit: true` here resets gh-pages history to one commit
#     containing the current state after JamesIves cleans+copies /fonts/.
#   * `yarn deploy` runs `gh-pages --no-history --remove '{assets,wingfont}/**'`
#     which does the equivalent on the web side: clean replace of the two
#     subdirs the React build owns, leave /fonts/ alone, force-push one
#     commit.
#
# Coexistence safety:
#   * `clean: true` here is scoped to `target-folder` (`fonts/`), so this
#     workflow never touches the React app at the root.
#   * `yarn deploy`'s `--remove "{assets,wingfont}/**"` (not the default
#     `--remove '.'`) means it never wipes /fonts/.
#
# The remaining race window — both workflows pushing within the same
# few seconds — is mitigated by the `concurrency` group below
# (serialises CI pushes) and by the actions retrying on
# non-fast-forward. In practice manual yarn deploys and CI auto-runs
# don't usually collide. With single-commit on both sides, the retry
# logic re-fetches the latest state before the force-push, so the worst
# case is "second push waits briefly and tries again".

on:
  push:
    # Avoid spending CI minutes on web-only changes — fonts only need to
    # rebuild when the Python pipeline or a mapping CSV moves.
    paths:
      - 'python/**'
      - '.github/workflows/build-fonts.yml'
  workflow_dispatch:

permissions:
  # Needed for the gh-pages push.
  contents: write

# Serialise concurrent CI runs to the same target so two pushes never
# race each other. `cancel-in-progress: false` means a newer run waits
# for the older one rather than interrupting it — important because we
# don't want a half-uploaded /fonts/ on the live branch.
concurrency:
  group: gh-pages-fonts
  cancel-in-progress: false

jobs:
  Generate-Fonts:
    runs-on: ubuntu-latest
    # Run every step inside python/ so the existing commands keep using
    # plain relative paths like `input_fonts/...` and `mappings/...`.
    defaults:
      run:
        working-directory: python

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
            python-version: '3.12'
            architecture: 'x64'
            cache: 'pip'
            cache-dependency-path: ./python/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
      - name: Generate Fonts
        run: |
          mkdir -p outputs
          set -o xtrace
          # ─ Naming convention (applies to every line below) ────────
          #
          # Output font names follow `<Base>-<Anno>-<mapping>[-It][-Invert]`:
          #   • <Base>     ChironSungHK or ChironHeiHK (+ -B for Bold)
          #   • <Anno>     Noto (for NotoSerif Latin annotation),
          #                Google (for Google Sans Thai),
          #                NotoJP / NotoKR (for the JP / KR Noto Sans).
          #                Cangjie has no <Anno> segment because the
          #                annotation is the base font itself.
          #   • <mapping>  Lowercase mapping suffix: lshk / yale /
          #                chishima / guangdong / lau / cangjie /
          #                thai / katakana / korean. Lowercase by
          #                convention because mapping CSV filenames
          #                are lowercase.
          #   • -It        Capitalised, present iff the base font is
          #                the italic Chiron Sung. Style suffixes are
          #                title-cased for legibility.
          #   • -Invert    Capitalised, present iff `-v` (annotation
          #                below base) is set. The `-f` family name
          #                MUST include this suffix or the inverted
          #                build collides at OS-level with its
          #                non-inverted twin (same family + subfamily
          #                = the OS keeps one and silently drops the
          #                other from Font Book / Word / Pages).
          #
          # Output FILENAMES mirror the family name exactly (no
          # `.invert` period separator) so the file and the font
          # identify themselves consistently.
          #
          # === Inverted variants (annotation below base) ============
          # ChironHei + LSHK (only Hei combo we ship):
          python wing-font.py -v -y 0.3 -opt -f ChironHeiHK-Noto-lshk-B-Invert -i input_fonts/ChironHeiHK-B.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -o outputs/ChironHeiHK-Noto-lshk-B-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironHeiHK-Noto-lshk-Invert -i input_fonts/ChironHeiHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -o outputs/ChironHeiHK-Noto-lshk-Invert -as 0.13
          # ChironSung Regular + each Cantonese romanization:
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-lshk-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -o outputs/ChironSungHK-Noto-lshk-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-yale-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -o outputs/ChironSungHK-Noto-yale-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-chishima-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -o outputs/ChironSungHK-Noto-chishima-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-guangdong-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -o outputs/ChironSungHK-Noto-guangdong-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-lau-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -o outputs/ChironSungHK-Noto-lau-Invert -as 0.13
          python wing-font.py -v -y 0.3 -f ChironSungHK-cangjie-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -o outputs/ChironSungHK-cangjie-Invert -as 0.25
          # ChironSung Italic + each Cantonese romanization:
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-lshk-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -o outputs/ChironSungHK-Noto-lshk-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-yale-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -o outputs/ChironSungHK-Noto-yale-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-chishima-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -o outputs/ChironSungHK-Noto-chishima-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-guangdong-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -o outputs/ChironSungHK-Noto-guangdong-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Noto-lau-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -o outputs/ChironSungHK-Noto-lau-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -f ChironSungHK-cangjie-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/ChironSungHK-R-It.ttf -m mappings/cangjie.csv -o outputs/ChironSungHK-cangjie-It-Invert -as 0.25
          # === Standard variants (annotation above base) ============
          python wing-font.py -opt -f ChironSungHK-Noto-lshk -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -o outputs/ChironSungHK-Noto-lshk -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-yale -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -o outputs/ChironSungHK-Noto-yale -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-chishima -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -o outputs/ChironSungHK-Noto-chishima -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-guangdong -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -o outputs/ChironSungHK-Noto-guangdong -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-lau -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -o outputs/ChironSungHK-Noto-lau -as 0.13
          python wing-font.py -f ChironSungHK-cangjie -i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -o outputs/ChironSungHK-cangjie -as 0.25
          python wing-font.py -opt -f ChironSungHK-Noto-lshk-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -o outputs/ChironSungHK-Noto-lshk-It -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-yale-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -o outputs/ChironSungHK-Noto-yale-It -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-chishima-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -o outputs/ChironSungHK-Noto-chishima-It -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-guangdong-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -o outputs/ChironSungHK-Noto-guangdong-It -as 0.13
          python wing-font.py -opt -f ChironSungHK-Noto-lau-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -o outputs/ChironSungHK-Noto-lau-It -as 0.13
          python wing-font.py -f ChironSungHK-cangjie-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/ChironSungHK-R-It.ttf -m mappings/cangjie.csv -o outputs/ChironSungHK-cangjie-It -as 0.25
          # === Script-specific annotation variants ==================
          #
          # Cantonese phonetics transliterated into Thai / Katakana /
          # Hangul, paired with the matching annotation font. The
          # <Anno> segment is "Google" (for Google Sans Thai),
          # "NotoJP" (Noto Sans JP), or "NotoKR" (Noto Sans KR) —
          # NOT "Noto-" like the Latin variants, because the
          # annotation font is no longer NotoSerif.
          #
          # Annotation strings are short (1-3 visible chars + tone
          # digit), so `-as 0.13` from the canto-lshk block reads
          # fine. Tune individually if any script needs more room.
          #
          # Inverted variants — ChironSung Regular:
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Google-thai-Invert -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -o outputs/ChironSungHK-Google-thai-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-NotoJP-katakana-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -o outputs/ChironSungHK-NotoJP-katakana-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-NotoKR-korean-Invert -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -o outputs/ChironSungHK-NotoKR-korean-Invert -as 0.13
          # Inverted variants — ChironSung Italic:
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-Google-thai-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -o outputs/ChironSungHK-Google-thai-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-NotoJP-katakana-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -o outputs/ChironSungHK-NotoJP-katakana-It-Invert -as 0.13
          python wing-font.py -v -y 0.3 -opt -f ChironSungHK-NotoKR-korean-It-Invert -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -o outputs/ChironSungHK-NotoKR-korean-It-Invert -as 0.13
          # Standard variants — ChironSung Regular:
          python wing-font.py -opt -f ChironSungHK-Google-thai -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -o outputs/ChironSungHK-Google-thai -as 0.13
          python wing-font.py -opt -f ChironSungHK-NotoJP-katakana -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -o outputs/ChironSungHK-NotoJP-katakana -as 0.13
          python wing-font.py -opt -f ChironSungHK-NotoKR-korean -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -o outputs/ChironSungHK-NotoKR-korean -as 0.13
          # Standard variants — ChironSung Italic:
          python wing-font.py -opt -f ChironSungHK-Google-thai-It -i input_fonts/ChironSungHK-R-It.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -o outputs/ChironSungHK-Google-thai-It -as 0.13
          python wing-font.py -opt -f ChironSungHK-NotoJP-katakana-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -o outputs/ChironSungHK-NotoJP-katakana-It -as 0.13
          python wing-font.py -opt -f ChironSungHK-NotoKR-korean-It -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -o outputs/ChironSungHK-NotoKR-korean-It -as 0.13

      - name: Stage font outputs for deploy
        # Collect just the .ttf/.woff files into a flat folder so the
        # deploy action below has a clean tree to upload — no Python
        # intermediates, no stale files from previous runs.
        # We deliberately do NOT bundle CNAME here: the gh-pages root
        # already owns the CNAME via web/public/CNAME shipped by
        # `yarn deploy`, and dropping a competing CNAME inside /fonts/
        # would be ignored anyway (GitHub Pages only honours the
        # top-level CNAME file).
        working-directory: .
        run: |
          mkdir -p fonts
          cp python/outputs/*.ttf fonts/
          cp python/outputs/*.woff fonts/
          ls -lh fonts/
      - name: Upload fonts as workflow artifact
        # Kept as an inspectable artifact even though we now also
        # deploy. Handy for verifying what was published and for
        # local-side download if someone wants to grab a specific run.
        uses: actions/upload-artifact@v4
        with:
          name: wing-fonts
          path: fonts/
          retention-days: 30
      - name: Deploy fonts to gh-pages /fonts/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # Source folder we just staged.
          folder: fonts
          # Target SUBFOLDER on gh-pages — everything outside /fonts/
          # (i.e. the React app at the branch root) is untouched.
          target-folder: fonts
          branch: gh-pages
          # `clean: true` here is scoped to the target-folder, so it
          # wipes only /fonts/ (lets us drop renamed/removed fonts
          # cleanly). The React app at the root is safe.
          clean: true
          commit-message: "fonts: update from ${{ github.sha }}"
          # `single-commit: true` rewrites gh-pages history to one
          # commit per deploy, containing the resulting tree (web app
          # at root + new fonts at /fonts/). Branch size = current
          # snapshot, forever — see the comment block at the top of
          # this file for why we converged on this. force-push is
          # implicit with single-commit (you can't rewrite history
          # without it); the action retries on non-fast-forward.
          single-commit: true
