name: Fonts Generation

# Builds the production fonts (46 entries as of the SC + Mandarin
# addition) in parallel via a matrix strategy, then deploys them to
# the `fonts/` subfolder of the `gh-pages` branch — i.e. served at
# https://wing-fonts.chunlaw.io/fonts/X.{ttf,woff}.
#
# Architecture
# ------------
# Job 1 (Build) — strategy.matrix with one entry per font. Each slot
#   is its own runner: checkout + pip-install (cached) + one
#   `python wing-font.py …` invocation + upload-artifact. With 46
#   entries the matrix runs ~20 in parallel on GitHub-hosted runners
#   (free-tier concurrency cap), so wall-clock per workflow is
#   ~ceil(46 / 20) × per-font-build ≈ 3-5 minutes vs the old single-
#   job ~25-40 minutes.
#
# Job 2 (Deploy) — depends on Build, runs once. Downloads every
#   `font-*` artifact into a flat `fonts/` directory and force-pushes
#   that directory into gh-pages /fonts/ via JamesIves.
#
# `fail-fast: false` is set on the Build matrix so one font's failure
# never cancels the other 45. The Deploy job has `if: ${{ ! failure() }}`
# so a partial set still ships when a single font breaks — preferable
# to a fully-stale /fonts/ when most fonts built fine.
#
# Coexistence with `yarn deploy`
# ------------------------------
# `yarn deploy` (from web/) writes to the gh-pages branch ROOT —
# index.html, /assets/, /favicon.ico, etc. This workflow writes to
# gh-pages /fonts/ only (via `target-folder: fonts`). Different
# paths, no collision.
#
# Both writers force-push a SINGLE COMMIT per deploy so the gh-pages
# branch tree stays at "current snapshot" size — no history
# accumulation, no stale-hashed-asset bloat, fast checkout for
# GitHub's auto pages-build-deployment workflow:
#
#   * `single-commit: true` here resets gh-pages history to one
#     commit containing the current state after JamesIves
#     cleans+copies /fonts/.
#   * `yarn deploy` runs `gh-pages --no-history --remove '{assets,wingfont}/**'`
#     which does the equivalent on the web side: clean replace of the
#     two subdirs the React build owns, leave /fonts/ alone,
#     force-push one commit.
#
# Coexistence safety:
#   * `clean: true` here is scoped to `target-folder` (`fonts/`), so
#     this workflow never touches the React app at the root.
#   * `yarn deploy`'s `--remove "{assets,wingfont}/**"` (not the
#     default `--remove '.'`) means it never wipes /fonts/.
#
# The remaining race window — both workflows pushing within the same
# few seconds — is mitigated by the workflow-level `concurrency`
# group below (serialises CI pushes of THIS workflow) and by the
# actions retrying on non-fast-forward. With single-commit on both
# sides, the retry logic re-fetches the latest state before the
# force-push, so the worst case is "second push waits briefly and
# tries again".

on:
  push:
    # Avoid spending CI minutes on web-only changes — fonts only need
    # to rebuild when the Python pipeline or a mapping CSV moves.
    paths:
      - 'python/**'
      - '.github/workflows/build-fonts.yml'
  workflow_dispatch:

permissions:
  # Needed for the gh-pages push (Deploy job only, but applies to all
  # jobs in this workflow).
  contents: write

# Serialise concurrent workflow runs so two pushes never race each
# other on gh-pages. `cancel-in-progress: false` means a newer run
# waits for the older one rather than interrupting it — important
# because we don't want a half-uploaded /fonts/ on the live branch.
# Matrix entries WITHIN a single run still parallelise; this only
# serialises runs of the workflow against each other.
concurrency:
  group: gh-pages-fonts
  cancel-in-progress: false

jobs:
  Build:
    # Display name includes the font so each matrix slot shows as
    # e.g. "Build (ChironSungHK-Noto-lshk)" in the Actions UI —
    # makes the 46-row workflow run easy to scan for failures.
    name: Build (${{ matrix.font.name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    strategy:
      # See top-of-file comment for the fail-fast rationale.
      fail-fast: false
      # `max-parallel: 20` matches GitHub's free-tier concurrency cap
      # and documents the intent. Higher accounts (Pro/Team/Enterprise)
      # can raise this; lower this if you ever want to be polite about
      # CI-minute consumption on a public org.
      max-parallel: 20
      matrix:
        # Each entry: name (used for -f / -o / artifact name) and the
        # rest of the `wing-font.py` flags as a single `args` string.
        # Sections preserve the original groupings from the
        # sequential script — same naming convention, same `-as` per
        # script, same `-v -y 0.3` for inverted variants, same
        # `-opt` everywhere except cangjie (which would self-subset
        # since its annotation IS the base font).
        #
        # ─ Naming convention (applies to every entry below) ───────
        #
        # Output font names follow `<Base>-<Anno>-<mapping>[-It][-Invert]`:
        #   • <Base>     ChironSungHK or ChironHeiHK (+ -B for Bold),
        #                or NotoSansTC / NotoSansSC for the showcase
        #                pairings.
        #   • <Anno>     Noto (for NotoSerif Latin annotation),
        #                Google (for Google Sans Thai),
        #                NotoJP / NotoKR (for the JP / KR Noto Sans),
        #                Huninn (for Tâi-lô / POJ / Teochew / Mandarin).
        #                Cangjie has no <Anno> segment because the
        #                annotation is the base font itself.
        #   • <mapping>  Lowercase mapping suffix matching the CSV
        #                filename: lshk / yale / chishima / guangdong /
        #                lau / cangjie / thai / katakana / korean /
        #                tailo / poj / teochew-pengim / teochew-puj /
        #                mandarin.
        #   • -It        Capitalised, present iff the base font is
        #                the italic Chiron Sung.
        #   • -Invert    Capitalised, present iff `-v` (annotation
        #                below base) is set. The `-f` family name
        #                MUST include this suffix or the inverted
        #                build collides at OS-level with its
        #                non-inverted twin.
        #
        # ─ Annotation scale (`-as`) convention ────────────────────
        #
        # `-as` is UPM-INDEPENDENT (normalized in build_glyph.py):
        # the value is a fraction of the OUTPUT em, so the SAME
        # number renders at the SAME visual size no matter what
        # unitsPerEm the annotation font uses.
        #   • 0.27 — Latin (NotoSerif): caps fill the band above the
        #            base (~0.19 em cap-height).
        #   • 0.25 — Cangjie (CJK radicals fill the em, so slightly
        #            smaller); Huninn for Tâi-lô / POJ / Teochew /
        #            Mandarin (Latin letters + combining tone marks).
        #   • 0.24 — Katakana / Korean.
        #   • 0.22 — Thai (held smaller to leave headroom for vowel
        #            + tone-mark stacks).
        font:
          # === Inverted variants — ChironHei + LSHK ================
          - { name: ChironHeiHK-Noto-lshk-B-Invert,        args: "-v -y 0.3 -opt -i input_fonts/ChironHeiHK-B.ttf  -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironHeiHK-Noto-lshk-Invert,          args: "-v -y 0.3 -opt -i input_fonts/ChironHeiHK-R.ttf  -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          # === Inverted variants — ChironSung Regular + each Cantonese romanization
          - { name: ChironSungHK-Noto-lshk-Invert,         args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale-Invert,         args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima-Invert,     args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong-Invert,    args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau-Invert,          args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          # Cangjie skips -opt: annotation IS the base font, subsetting would break the self-reference.
          - { name: ChironSungHK-cangjie-Invert,           args: "-v -y 0.3 -i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Inverted variants — ChironSung Italic + each Cantonese romanization
          - { name: ChironSungHK-Noto-lshk-It-Invert,      args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale-It-Invert,      args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima-It-Invert,  args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong-It-Invert, args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau-It-Invert,       args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie-It-Invert,        args: "-v -y 0.3 -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/ChironSungHK-R-It.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Standard variants — ChironSung Regular ===============
          - { name: ChironSungHK-Noto-lshk,                args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale,                args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima,            args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong,           args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau,                 args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie,                  args: "-i input_fonts/ChironSungHK-R.ttf -a input_fonts/ChironSungHK-R.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Standard variants — ChironSung Italic ================
          - { name: ChironSungHK-Noto-lshk-It,             args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lshk.csv -as 0.27" }
          - { name: ChironSungHK-Noto-yale-It,             args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-yale.csv -as 0.27" }
          - { name: ChironSungHK-Noto-chishima-It,         args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-chishima.csv -as 0.27" }
          - { name: ChironSungHK-Noto-guangdong-It,        args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-guangdong.csv -as 0.27" }
          - { name: ChironSungHK-Noto-lau-It,              args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/canto-lau.csv -as 0.27" }
          - { name: ChironSungHK-cangjie-It,               args: "-i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/ChironSungHK-R-It.ttf -m mappings/cangjie.csv -as 0.25" }
          # === Script-specific annotation variants =================
          # Inverted, ChironSung Regular:
          - { name: ChironSungHK-Google-thai-Invert,       args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana-Invert,   args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean-Invert,     args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Inverted, ChironSung Italic:
          - { name: ChironSungHK-Google-thai-It-Invert,    args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana-It-Invert, args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean-It-Invert,  args: "-v -y 0.3 -opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Standard, ChironSung Regular:
          - { name: ChironSungHK-Google-thai,              args: "-opt -i input_fonts/ChironSungHK-R.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana,          args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean,            args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # Standard, ChironSung Italic:
          - { name: ChironSungHK-Google-thai-It,           args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a 'input_fonts/GoogleSans-VariableFont_GRAD,opsz,wght.ttf' -m mappings/canto-thai.csv -as 0.22" }
          - { name: ChironSungHK-NotoJP-katakana-It,       args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansJP-VariableFont_wght.ttf -m mappings/canto-katakana.csv -as 0.24" }
          - { name: ChironSungHK-NotoKR-korean-It,         args: "-opt -i input_fonts/ChironSungHK-R-It.ttf -a input_fonts/NotoSansKR-VariableFont_wght.ttf -m mappings/canto-korean.csv -as 0.24" }
          # === Hero sample font ====================================
          # Tiny ~25KB font used to render the home-page hero text.
          # Mapping CSV contains only the chars of the hero phrase.
          # @font-face referenced from web/src/index.css as
          # `ChironSungHK-hero-sample`. Edit mappings/hero-sample.csv
          # when the hero text changes.
          - { name: ChironSungHK-hero-sample,              args: "-opt -i input_fonts/ChironSungHK-R.ttf -a input_fonts/NotoSerif-Regular.ttf -m mappings/hero-sample.csv -as 0.27" }
          # === Taiwanese / Southern Min (河洛話) showcase ===========
          # Noto Sans TC base + Huninn (carries every Tâi-lô / POJ
          # combining tone mark + nasal ⁿ + POJ o͘ dot). Two
          # tone-marked schemes (tailo, poj) + hero-tailo.
          # Data source: AlanJui/Piau-Im + AlanJui/rime-tlpa.
          - { name: NotoSansTC-Huninn-tailo,               args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-tl-toned.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-poj,                 args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/taigi-poj-toned.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-hero-tailo,          args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-taigi.csv -as 0.25" }
          # === Teochew / Min Nan (潮州話) showcase ==================
          # Reuses the Noto Sans TC + Huninn pairing. Two schemes
          # (pengim numeric-tone, puj diacritic-tone) + hero-pengim.
          # Data source: learn-teochew + parsetc.
          - { name: NotoSansTC-Huninn-teochew-pengim,      args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-gdpi.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-teochew-puj,         args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/teochew-duffus.csv -as 0.25" }
          - { name: NotoSansTC-Huninn-hero-pengim,         args: "-opt -i input_fonts/NotoSansTC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/hero-teochew.csv -as 0.25" }
          # === Mandarin (普通話 / 國語) showcase ====================
          # Noto Sans SC base + Huninn anno + numeric-tone Hanyu Pinyin.
          # The mapping is ~95k rows (full CJK ideograph range), so
          # this single entry takes longer to build than any other
          # font in the matrix — but in parallel that's irrelevant
          # for wall-clock since other entries finish concurrently.
          # Data source: Unihan kMandarin + CC-CEDICT.
          - { name: NotoSansSC-Huninn-mandarin,            args: "-opt -i input_fonts/NotoSansSC-VariableFont_wght.ttf -a input_fonts/Huninn-Regular.ttf -m mappings/mandarin.csv -as 0.25" }

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
            python-version: '3.12'
            architecture: 'x64'
            cache: 'pip'
            cache-dependency-path: ./python/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
      - name: Build font
        # `${{ matrix.font.args }}` expands at YAML render time, so the
        # bash command sees the literal flag string. Single quotes
        # inside args (around the GoogleSans filename with commas)
        # survive the substitution because they're already inside a
        # double-quoted YAML string. `set -o xtrace` echoes the
        # resolved command into the log for debuggability.
        run: |
          mkdir -p outputs
          set -o xtrace
          python wing-font.py ${{ matrix.font.args }} -f ${{ matrix.font.name }} -o outputs/${{ matrix.font.name }}
      - name: Upload font artifact
        # One artifact per font so the Deploy job can download with
        # `pattern: font-*` + `merge-multiple: true` and end up with a
        # flat `fonts/` directory ready for gh-pages. Short retention
        # because the Deploy job consumes these within minutes; the
        # combined `wing-fonts` artifact in the Deploy job is the
        # inspectable copy kept for 30 days.
        uses: actions/upload-artifact@v4
        with:
          name: font-${{ matrix.font.name }}
          path: |
            python/outputs/${{ matrix.font.name }}.ttf
            python/outputs/${{ matrix.font.name }}.woff
          retention-days: 1
          if-no-files-found: error

  Deploy:
    name: Deploy /fonts/ to gh-pages
    needs: Build
    runs-on: ubuntu-latest
    # Run even if some matrix entries failed — better to ship the
    # surviving fonts than leave /fonts/ stale. `failure()` would
    # block; `! failure()` allows partial-success + skip-on-cancel.
    if: ${{ ! failure() }}
    steps:
      - name: Download all font artifacts
        # `pattern: font-*` matches every per-font artifact uploaded
        # by the Build matrix; `merge-multiple: true` flattens them
        # into one directory so the deploy action sees a clean tree.
        uses: actions/download-artifact@v4
        with:
          pattern: font-*
          merge-multiple: true
          path: fonts
      - name: List fonts to be deployed
        run: ls -lh fonts/
      - name: Upload combined artifact
        # Inspectable snapshot of the full /fonts/ tree, kept longer
        # than the per-font artifacts in case someone wants to grab a
        # specific run's output without re-pulling 46 individual ones.
        uses: actions/upload-artifact@v4
        with:
          name: wing-fonts
          path: fonts/
          retention-days: 30
      - name: Deploy fonts to gh-pages /fonts/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # Source folder we just downloaded into.
          folder: fonts
          # Target SUBFOLDER on gh-pages — everything outside /fonts/
          # (i.e. the React app at the branch root) is untouched.
          target-folder: fonts
          branch: gh-pages
          # `clean: true` here is scoped to the target-folder, so it
          # wipes only /fonts/ (lets us drop renamed/removed fonts
          # cleanly). The React app at the root is safe.
          clean: true
          commit-message: "fonts: update from ${{ github.sha }}"
          # `single-commit: true` rewrites gh-pages history to one
          # commit per deploy, containing the resulting tree (web app
          # at root + new fonts at /fonts/). Branch size = current
          # snapshot, forever — see the comment block at the top of
          # this file for why we converged on this. force-push is
          # implicit with single-commit (you can't rewrite history
          # without it); the action retries on non-fast-forward.
          single-commit: true
